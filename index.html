<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍓 宝宝点单啦</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #FF4D6D;
    --primary-light: #FFF0F3;
    --primary-dark: #E0115F;
    --bg: #F8F9FB;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --text-secondary: #6B7280;
    --text-tertiary: #9CA3AF;
    --border: #E5E7EB;
    --success: #10B981;
    --radius: 16px;
    --radius-sm: 12px;
    --radius-xs: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(248,249,251,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 12px 20px 8px;
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s;
  }
  .top-bar.scrolled { border-bottom-color: var(--border); }
  .top-bar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .greeting {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .greeting-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #FF8FA3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 2px 8px rgba(255,77,109,0.3);
  }
  .greeting-text h1 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .greeting-text p {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 1px;
  }
  .top-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
  }
  .icon-btn:active { transform: scale(0.92); background: var(--primary-light); }

  /* ===== HERO BANNER ===== */
  .hero {
    margin: 12px 20px 0;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    height: 140px;
    background: linear-gradient(135deg, #FF4D6D 0%, #FF8FA3 50%, #FFC2D1 100%);
    display: flex;
    align-items: center;
    padding: 20px 24px;
    box-shadow: 0 4px 20px rgba(255,77,109,0.2);
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-tag {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .hero-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .hero-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
  }
  .hero-deco {
    position: absolute;
    right: 20px;
    bottom: -10px;
    font-size: 80px;
    opacity: 0.15;
    transform: rotate(-15deg);
  }
  .hero-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 3;
  }
  .hero-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }
  .hero-dot.active { background: #fff; width: 16px; border-radius: 3px; }

  /* ===== CATEGORY TABS ===== */
  .category-bar {
    padding: 16px 0 0;
    position: sticky;
    top: 60px;
    z-index: 40;
    background: rgba(248,249,251,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .category-scroll {
    display: flex;
    padding: 0 20px;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .category-scroll::-webkit-scrollbar { display: none; }
  .cat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--card);
    border: 1.5px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
    user-select: none;
  }
  .cat-pill:active { transform: scale(0.95); }
  .cat-pill.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    box-shadow: 0 2px 12px rgba(255,77,109,0.35);
    font-weight: 600;
  }
  .cat-emoji { font-size: 16px; }

  /* ===== MENU SECTION ===== */
  .menu-section {
    padding: 16px 20px 140px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .section-count {
    font-size: 12px;
    color: var(--text-tertiary);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 12px;
  }
  .menu-item {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    border: 1px solid transparent;
  }
  .menu-item:active { transform: scale(0.985); }
  .menu-item-icon {
    font-size: 32px;
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--primary-light);
    border-radius: var(--radius-xs);
  }
  .menu-item-info { flex: 1; min-width: 0; }
  .menu-item-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .menu-item-desc {
    font-size: 12px;
    color: var(--text-tertiary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .menu-item-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--primary);
    border: none;
    font-size: 18px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    line-height: 1;
  }
  .menu-item-btn:active {
    transform: scale(1.2);
    background: var(--primary-dark);
  }

  /* ===== CART BAR ===== */
  .cart-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    cursor: pointer;
    user-select: none;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .cart-bar.hidden { transform: translateX(-50%) translateY(100%); }
  .cart-icon-wrap {
    position: relative;
    width: 48px;
    height: 48px;
    background: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 2px 12px rgba(255,77,109,0.35);
    flex-shrink: 0;
  }
  .cart-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    background: var(--text);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    padding: 0 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
  }
  .cart-info { flex: 1; }
  .cart-bar-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .cart-bar-sub {
    font-size: 12px;
    color: var(--text-tertiary);
  }
  .cart-action {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(255,77,109,0.3);
  }
  .cart-action:active { transform: scale(0.95); }
  .cart-empty-icon {
    font-size: 18px;
  }

  /* ===== BOTTOM SHEET ===== */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .sheet-overlay.show { opacity: 1; pointer-events: all; }
  .sheet {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--card);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
    max-height: 65vh;
    display: flex;
    flex-direction: column;
  }
  .sheet.show { transform: translateX(-50%) translateY(0); }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: #E5E7EB;
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }
  .sheet-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sheet-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sheet-title span { font-size: 14px; color: var(--text-tertiary); font-weight: 500; }
  .sheet-items {
    overflow-y: auto;
    flex: 1;
    padding: 8px 20px;
  }
  .sheet-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--bg);
  }
  .sheet-item:last-child { border-bottom: none; }
  .sheet-item-icon {
    width: 44px;
    height: 44px;
    background: var(--primary-light);
    border-radius: var(--radius-xs);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .sheet-item-info { flex: 1; min-width: 0; }
  .sheet-item-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .sheet-item-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .sheet-item-qty {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 16px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    transition: all 0.15s;
  }
  .qty-btn:active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
  .qty-num {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    min-width: 24px;
    text-align: center;
  }
  .sheet-footer {
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-shrink: 0;
    background: var(--card);
  }
  .btn-clear {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: none;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-clear:active { background: var(--bg); }
  .btn-send {
    flex: 2;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(255,77,109,0.3);
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-send:active { transform: scale(0.97); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: rgba(26,26,46,0.88);
    backdrop-filter: blur(10px);
    color: #fff;
    padding: 14px 24px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    text-align: center;
    max-width: 260px;
    line-height: 1.5;
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ===== LOVE POPUP ===== */
  .love-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .love-overlay.show { opacity: 1; pointer-events: all; }
  .love-popup {
    background: var(--card);
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
    width: 85%;
    box-shadow: var(--shadow-lg);
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .love-overlay.show .love-popup { transform: scale(1); }
  .love-popup-emoji { font-size: 56px; margin-bottom: 16px; }
  .love-popup-text {
    font-size: 16px;
    line-height: 1.7;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 20px;
  }
  .love-popup-btn {
    background: var(--primary);
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 32px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(255,77,109,0.3);
  }

  /* ===== COMFORT POPUP ===== */
  .comfort-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .comfort-overlay.show { opacity: 1; pointer-events: all; }
  .comfort-popup {
    background: linear-gradient(135deg, #FFF0F3, #F0F9FF);
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
    width: 85%;
    box-shadow: var(--shadow-lg);
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .comfort-overlay.show .comfort-popup { transform: scale(1); }
  .comfort-popup-emoji { font-size: 56px; margin-bottom: 16px; }
  .comfort-popup-text {
    font-size: 16px;
    line-height: 1.7;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 20px;
  }
  .comfort-popup-btn {
    background: linear-gradient(135deg, #10B981, #059669);
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 32px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(16,185,129,0.3);
  }

  /* ===== WAITER CARD ===== */
  .waiter-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 502;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .waiter-overlay.show { opacity: 1; pointer-events: all; }
  .waiter-card {
    background: var(--card);
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
    width: 85%;
    box-shadow: var(--shadow-lg);
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .waiter-overlay.show .waiter-card { transform: scale(1); }
  .waiter-avatar {
    width: 90px;
    height: 90px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    box-shadow: 0 4px 16px rgba(255,77,109,0.2);
  }
  .waiter-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .waiter-title { font-size: 13px; color: var(--text-tertiary); margin-bottom: 16px; }
  .waiter-msg {
    background: var(--primary-light);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 20px;
    text-align: left;
  }
  .waiter-close {
    background: var(--primary);
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 28px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(255,77,109,0.3);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .menu-item { animation: fadeInUp 0.3s ease forwards; }
  .menu-item:nth-child(1) { animation-delay: 0s; }
  .menu-item:nth-child(2) { animation-delay: 0.03s; }
  .menu-item:nth-child(3) { animation-delay: 0.06s; }
  .menu-item:nth-child(4) { animation-delay: 0.09s; }
  .menu-item:nth-child(5) { animation-delay: 0.12s; }
  .menu-item:nth-child(6) { animation-delay: 0.15s; }
  .menu-item:nth-child(7) { animation-delay: 0.18s; }
  .menu-item:nth-child(8) { animation-delay: 0.21s; }
  .menu-item:nth-child(9) { animation-delay: 0.24s; }
  .menu-item:nth-child(10) { animation-delay: 0.27s; }

  /* Heart rain */
  .heart-rain-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 499;
    overflow: hidden;
  }
  .falling-heart {
    position: absolute;
    top: -60px;
    font-size: 28px;
    animation: fallDown linear forwards;
    opacity: 0.8;
  }
  @keyframes fallDown {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
  .rainbow-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 499;
    overflow: hidden;
  }
  .flying-emoji {
    position: absolute;
    font-size: 32px;
    animation: flyUp linear forwards;
  }
  @keyframes flyUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-110vh) scale(0.5) rotate(180deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar" id="topBar">
  <div class="top-bar-inner">
    <div class="greeting" id="logo" onclick="handleLogoClick()">
      <div class="greeting-avatar">🍓</div>

// ===== STATE =====
let currentTab = 0;
let cart = {};
let logoClickCount = 0;
let logoClickTimer = null;
let sadClickCount = 0;
let sadClickTimer = null;

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}
function playTone(freq, type = 'sine', dur = 0.15, vol = 0.3) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playAdd() { playTone(600, 'sine', 0.12, 0.25); setTimeout(() => playTone(800, 'sine', 0.12, 0.2), 80); }
function playEgg1() {
  [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.2,0.3), i*80));
}
function playEgg2() {
  [392,494,587,698,784].forEach((f,i) => setTimeout(() => playTone(f,'triangle',0.18,0.25), i*70));
}
function playEgg3() {
  [880,1046,1318].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.3,0.3), i*100));
}
function playSend() {
  [523,659,784].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.2,0.3), i*90));
}

// ===== RENDER =====
function renderMenu() {
  const section = document.getElementById('menuSection');
  const items = menus[currentTab];
  const tabNames = ['饮品推荐', '美食精选', '约会计划', '撒娇专区'];
  section.innerHTML = `
    <div class="section-header">
      <div class="section-title">${tabNames[currentTab]}</div>
      <div class="section-count">${items.length} 项</div>
    </div>
  `;
  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.style.animationDelay = (idx * 0.03) + 's';
    if (item.id) div.id = item.id;
    div.innerHTML = `
      <div class="menu-item-icon">${item.icon}</div>
      <div class="menu-item-info">
        <div class="menu-item-name">${item.name}</div>
        <div class="menu-item-desc">${item.desc}</div>
      </div>
      <button class="menu-item-btn" onclick="addToCart(${currentTab},${idx},event)">＋</button>
    `;
    if (item.special === 'sad') {
      div.addEventListener('click', (e) => {
        if (!e.target.classList.contains('menu-item-btn')) handleSadClick();
      });
    }
    section.appendChild(div);
  });
}

function updateCartBar() {
  const total = Object.values(cart).reduce((s, v) => s + v.qty, 0);
  document.getElementById('cartBadge').textContent = total;
  const title = document.getElementById('cartBarTitle');
  const sub = document.getElementById('cartBarSub');
  if (total === 0) {
    title.textContent = '购物车';
    sub.textContent = '还没选呢，快点点吧';
  } else {
    const names = Object.values(cart).map(v => v.name).slice(0,2).join('、');
    const more = Object.keys(cart).length > 2 ? '...' : '';
    title.textContent = `${names}${more}`;
    sub.textContent = `共 ${total} 件`;
  }
}

function renderCartItems() {
  const container = document.getElementById('sheetItems');
  const keys = Object.keys(cart);
  const total = Object.values(cart).reduce((s, v) => s + v.qty, 0);
  document.getElementById('sheetCount').textContent = `共${total}件`;
  if (keys.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-tertiary);font-size:14px">空空如也，快去选些喜欢的吧～</div>';
    return;
  }
  container.innerHTML = '';
  keys.forEach(k => {
    const item = cart[k];
    const div = document.createElement('div');
    div.className = 'sheet-item';
    div.innerHTML = `
      <div class="sheet-item-icon">${item.icon}</div>
      <div class="sheet-item-info">
        <div class="sheet-item-name">${item.name}</div>
      </div>
      <div class="sheet-item-qty">
        <button class="qty-btn" onclick="changeQty('${k}',-1)">－</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${k}',1)">＋</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// ===== ACTIONS =====
function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.cat-pill').forEach((t, i) => t.classList.toggle('active', i === idx));
  renderMenu();
  // Scroll active pill into view
  const pills = document.querySelectorAll('.cat-pill');
  if (pills[idx]) {
    pills[idx].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }
}

function addToCart(tabIdx, itemIdx, e) {
  e.stopPropagation();
  const item = menus[tabIdx][itemIdx];
  const key = `${tabIdx}-${itemIdx}`;
  if (cart[key]) cart[key].qty++;
  else cart[key] = { name: item.name, icon: item.icon, qty: 1 };
  playAdd();
  updateCartBar();
}

function changeQty(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  renderCartItems();
  updateCartBar();
}

function openCart() {
  renderCartItems();
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeCart() {
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

function clearCart() {
  cart = {};
  renderCartItems();
  updateCartBar();
  showToast('已清空 🗑️');
}

function doSend() {
  playSend();
  const items = Object.values(cart);
  const orderList = items.map(v => `• ${v.icon} ${v.name} x${v.qty}`).join('\n');
  const total = items.reduce((s, v) => s + v.qty, 0);
  const title = `🛍️ 宝宝点单来啦！共${total}件`;
  const desp = `## 宝宝的订单 💕\n\n${orderList}\n\n---\n快去安排吧～`;
  fetch(`https://sctapi.ftqq.com/${SCTKEY}.send`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `title=${encodeURIComponent(title)}&desp=${encodeURIComponent(desp)}`
  }).catch(() => {});
  closeCart();
  setTimeout(() => showToast('💌 已发给TA啦！等TA回应吧～'), 300);
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');

}

function handleLogoClick() {

  overlay.innerHTML = '';

  const interval = setInterval(() => {
    if (count >= 40) { clearInterval(interval); return; }
    const h = document.createElement('div');
    h.className = 'falling-heart';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (20 + Math.random() * 20) + 'px';
    const dur = 2 + Math.random() * 2;
    h.style.animation = `fallDown ${dur}s linear forwards`;
    overlay.appendChild(h);
    setTimeout(() => h.remove(), dur * 1000);
    count++;

  const phrase = lovePhrases[Math.floor(Math.random() * lovePhrases.length)];
  document.getElementById('loveEmoji').textContent = phrase.emoji;
  document.getElementById('loveText').textContent = phrase.text;
  setTimeout(() => document.getElementById('loveOverlay').classList.add('show'), 400);
}
