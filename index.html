<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌽 玉米的专属点单</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #FF85A1;
    --light-pink: #FFD6E0;
    --cream: #FFF9F0;
    --mint: #B5EAD7;
    --soft-yellow: #FFDAC1;
    --purple: #C7CEEA;
    --text: #5C4A6E;
    --text-light: #9B8BA8;
    --white: #FFFFFF;
    --shadow: 0 4px 20px rgba(255,133,161,0.18);
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #FF85A1 0%, #FFB3C6 50%, #FFC8D8 100%);
    padding: 20px 20px 28px;
    text-align: center;
    position: relative;
    border-radius: 0 0 32px 32px;
    box-shadow: var(--shadow);
    user-select: none;
    cursor: pointer;
  }
  .header-deco {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .header-title {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 8px rgba(255,100,130,0.3);
    letter-spacing: 1px;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    margin-top: 4px;
  }
  .header-hearts {
    position: absolute;
    top: 12px; right: 16px;
    font-size: 20px;
    opacity: 0.6;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    padding: 16px 12px 0;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1;
    min-width: 72px;
    background: var(--white);
    border: 2px solid var(--light-pink);
    border-radius: 20px;
    padding: 8px 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    text-align: center;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .tab.active {
    background: var(--pink);
    border-color: var(--pink);
    color: #fff;
    box-shadow: 0 3px 12px rgba(255,133,161,0.4);
    transform: translateY(-2px);
  }
  .tab-emoji { display: block; font-size: 18px; margin-bottom: 2px; }

  /* ===== MENU LIST ===== */
  .menu-section {
    padding: 16px 16px 120px;
  }
  .section-label {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 12px;
    padding-left: 4px;
    letter-spacing: 1px;
  }
  .menu-item {
    background: var(--white);
    border-radius: 20px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(200,150,170,0.1);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-item:active { transform: scale(0.97); }
  .menu-item-icon {
    font-size: 36px;
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    border-radius: 16px;
  }
  .menu-item-info { flex: 1; min-width: 0; }
  .menu-item-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }
  .menu-item-desc {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.4;
  }
  .menu-item-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--light-pink);
    border: none;
    font-size: 20px;
    color: var(--pink);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .menu-item-btn:active {
    background: var(--pink);
    color: #fff;
    transform: scale(1.15);
  }

  /* ===== CART ===== */
  .cart-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 398px;
    background: linear-gradient(135deg, #FF85A1, #FF6B8A);
    border-radius: 24px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 6px 24px rgba(255,107,138,0.45);
    cursor: pointer;
    user-select: none;
    z-index: 100;
    transition: transform 0.2s;
  }
  .cart-bar:active { transform: translateX(-50%) scale(0.98); }
  .cart-icon-wrap {
    position: relative;
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.25);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .cart-badge {
    position: absolute;
    top: -5px; right: -5px;
    background: #fff;
    color: var(--pink);
    font-size: 11px;
    font-weight: 700;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .cart-info { flex: 1; }
  .cart-count { font-size: 13px; color: rgba(255,255,255,0.9); }
  .cart-action {
    background: #fff;
    color: var(--pink);
    border: none;
    border-radius: 14px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .cart-action:active { background: var(--light-pink); }
  .cart-empty-text {
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  /* ===== CART SHEET ===== */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(92,74,110,0.35);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .sheet-overlay.show { opacity: 1; pointer-events: all; }
  .sheet {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%; max-width: 430px;
    background: var(--white);
    border-radius: 28px 28px 0 0;
    padding: 20px 20px 40px;
    z-index: 201;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 70vh;
    display: flex; flex-direction: column;
  }
  .sheet.show { transform: translateX(-50%) translateY(0); }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--light-pink);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title {
    font-size: 18px; font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .sheet-items { overflow-y: auto; flex: 1; }
  .sheet-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--light-pink);
  }
  .sheet-item-icon { font-size: 24px; }
  .sheet-item-name { flex: 1; font-size: 14px; font-weight: 500; }
  .sheet-item-qty {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-light); font-size: 13px;
  }
  .qty-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--light-pink);
    background: none;
    font-size: 16px;
    color: var(--pink);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .sheet-footer {
    margin-top: 16px;
    display: flex; gap: 10px;
  }
  .btn-clear {
    flex: 1;
    padding: 14px;
    border-radius: 16px;
    border: 2px solid var(--light-pink);
    background: none;
    color: var(--text-light);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-send {
    flex: 2;
    padding: 14px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #FF85A1, #FF6B8A);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 16px rgba(255,107,138,0.4);
    position: relative;
    overflow: hidden;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(92,74,110,0.92);
    color: #fff;
    padding: 14px 28px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    text-align: center;
    max-width: 280px;
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* ===== EASTER EGG: HEART RAIN ===== */
  .heart-rain-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 500;
    overflow: hidden;
  }
  .falling-heart {
    position: absolute;
    top: -60px;
    font-size: 28px;
    animation: fallDown linear forwards;
    opacity: 0.9;
  }
  @keyframes fallDown {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
  .love-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #FF85A1, #FFB3C6);
    color: #fff;
    padding: 28px 32px;
    border-radius: 28px;
    z-index: 501;
    text-align: center;
    max-width: 300px;
    width: 85%;
    box-shadow: 0 10px 40px rgba(255,107,138,0.5);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .love-popup.show { transform: translate(-50%, -50%) scale(1); }
  .love-popup-emoji { font-size: 48px; margin-bottom: 12px; }
  .love-popup-text { font-size: 16px; line-height: 1.6; font-weight: 500; }
  .love-popup-close {
    margin-top: 16px;
    background: rgba(255,255,255,0.3);
    border: none;
    border-radius: 12px;
    padding: 8px 24px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ===== EASTER EGG: RAINBOW ===== */
  .rainbow-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 500;
    overflow: hidden;
  }
  .flying-emoji {
    position: absolute;
    font-size: 32px;
    animation: flyUp linear forwards;
  }
  @keyframes flyUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-110vh) scale(0.5) rotate(180deg); opacity: 0; }
  }
  .comfort-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #C7CEEA, #B5EAD7, #FFDAC1, #FFD6E0);
    background-size: 300% 300%;
    animation: gradientShift 2s ease infinite;
    color: var(--text);
    padding: 28px 32px;
    border-radius: 28px;
    z-index: 501;
    text-align: center;
    max-width: 300px;
    width: 85%;
    box-shadow: 0 10px 40px rgba(199,206,234,0.6);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .comfort-popup.show { transform: translate(-50%, -50%) scale(1); }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .comfort-popup-emoji { font-size: 48px; margin-bottom: 12px; }
  .comfort-popup-text { font-size: 16px; line-height: 1.6; font-weight: 600; color: var(--text); }
  .comfort-popup-close {
    margin-top: 16px;
    background: rgba(255,255,255,0.6);
    border: none;
    border-radius: 12px;
    padding: 8px 24px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ===== EASTER EGG: WAITER CARD ===== */
  .waiter-overlay {
    position: fixed; inset: 0;
    background: rgba(92,74,110,0.5);
    z-index: 502;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .waiter-overlay.show { opacity: 1; pointer-events: all; }
  .waiter-card {
    background: var(--white);
    border-radius: 28px;
    padding: 32px 28px;
    text-align: center;
    max-width: 300px;
    width: 85%;
    box-shadow: 0 10px 40px rgba(92,74,110,0.3);
    transform: scale(0.8);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .waiter-overlay.show .waiter-card { transform: scale(1); }
  .waiter-avatar {
    width: 100px; height: 100px;
    margin: 0 auto 16px;
    position: relative;
  }
  .waiter-avatar svg { width: 100%; height: 100%; }
  .waiter-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .waiter-title { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }
  .waiter-msg {
    background: var(--light-pink);
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .waiter-close {
    background: var(--pink);
    border: none;
    border-radius: 14px;
    padding: 10px 28px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  /* ===== ADD ANIMATION ===== */
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  .btn-send-press { animation: pressDown 2s ease; }
  @keyframes pressDown {
    0%, 100% { background: linear-gradient(135deg, #FF85A1, #FF6B8A); }
    50% { background: linear-gradient(135deg, #e0607a, #d44060); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="logo" onclick="handleLogoClick()">
  <div class="header-deco">🌽 玉米专属 · 随时点单 🌽</div>
  <div class="header-title">玉米的点单本</div>
  <div class="header-sub">想要什么尽管说，我来搞定 💕</div>
  <div class="header-hearts">🌽</div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
  <div class="tab active" onclick="switchTab(0)"><span class="tab-emoji">🧋</span>奶茶咖啡</div>
  <div class="tab" onclick="switchTab(1)"><span class="tab-emoji">🍽️</span>约饭餐厅</div>
  <div class="tab" onclick="switchTab(2)"><span class="tab-emoji">🎡</span>约会活动</div>
  <div class="tab" onclick="switchTab(3)"><span class="tab-emoji">🥺</span>撒娇选项</div>
</div>

<!-- MENU -->
<div class="menu-section" id="menuSection"></div>

<!-- CART BAR -->
<div class="cart-bar" id="cartBar" onclick="openCart()">
  <div class="cart-icon-wrap">
    🛍️
    <div class="cart-badge" id="cartBadge">0</div>
  </div>
  <div class="cart-info">
    <div id="cartBarText" class="cart-empty-text">玉米还没选呢，快挑起来～🌽</div>
  </div>
  <button class="cart-action" id="cartAction">去看看</button>
</div>

<!-- CART SHEET -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeCart()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">🛍️ 我的订单</div>
  <div class="sheet-items" id="sheetItems"></div>
  <div class="sheet-footer">
    <button class="btn-clear" onclick="clearCart()">清空</button>
    <button class="btn-send" id="btnSend" onclick="startSend()">发给他 💌🌽</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEART RAIN OVERLAY -->
<div class="heart-rain-overlay" id="heartRainOverlay"></div>
<div class="love-popup" id="lovePopup">
  <div class="love-popup-emoji" id="loveEmoji"></div>
  <div class="love-popup-text" id="loveText"></div>
  <button class="love-popup-close" onclick="closeLovePopup()">收到啦 💕</button>
</div>

<!-- RAINBOW OVERLAY -->
<div class="rainbow-overlay" id="rainbowOverlay"></div>
<div class="comfort-popup" id="comfortPopup">
  <div class="comfort-popup-emoji">🌽</div>
  <div class="comfort-popup-text">玉米不开心了？<br>那肯定是还没被夸够！<br>你是世界上最可爱的玉米！🌈</div>
  <button class="comfort-popup-close" onclick="closeComfortPopup()">嗯！玉米开心了！🌽</button>
</div>

<!-- WAITER OVERLAY -->
<div class="waiter-overlay" id="waiterOverlay" onclick="closeWaiter()">
  <div class="waiter-card" onclick="event.stopPropagation()">
    <div class="waiter-avatar">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- background circle -->
        <circle cx="50" cy="50" r="50" fill="#FFD6E0"/>
        <!-- body -->
        <ellipse cx="50" cy="78" rx="22" ry="18" fill="#FF85A1"/>
        <!-- bow tie -->
        <polygon points="38,72 46,76 38,80" fill="#FF6B8A"/>
        <polygon points="62,72 54,76 62,80" fill="#FF6B8A"/>
        <circle cx="50" cy="76" r="3" fill="#FFD6E0"/>
        <!-- head -->
        <circle cx="50" cy="44" r="22" fill="#FFDAC1"/>
        <!-- ears -->
        <circle cx="28" cy="38" r="7" fill="#FFDAC1"/>
        <circle cx="72" cy="38" r="7" fill="#FFDAC1"/>
        <circle cx="28" cy="38" r="4" fill="#FFB3C6"/>
        <circle cx="72" cy="38" r="4" fill="#FFB3C6"/>
        <!-- eyes -->
        <ellipse cx="42" cy="44" rx="4" ry="5" fill="#5C4A6E"/>
        <ellipse cx="58" cy="44" rx="4" ry="5" fill="#5C4A6E"/>
        <circle cx="43.5" cy="42.5" r="1.5" fill="white"/>
        <circle cx="59.5" cy="42.5" r="1.5" fill="white"/>
        <!-- blush -->
        <ellipse cx="35" cy="50" rx="5" ry="3" fill="#FFB3C6" opacity="0.7"/>
        <ellipse cx="65" cy="50" rx="5" ry="3" fill="#FFB3C6" opacity="0.7"/>
        <!-- smile -->
        <path d="M43 54 Q50 60 57 54" stroke="#FF85A1" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- hat -->
        <ellipse cx="50" cy="25" rx="24" ry="5" fill="#FF85A1"/>
        <rect x="36" y="8" width="28" height="18" rx="6" fill="#FF85A1"/>
        <rect x="42" y="12" width="16" height="2" rx="1" fill="#FFD6E0"/>
      </svg>
    </div>
    <div class="waiter-name">🌽 玉米专属服务员</div>
    <div class="waiter-title">⭐⭐⭐⭐⭐ 只为玉米服务</div>
    <div class="waiter-msg">
      哇！玉米点了这么多！<br>全都安排上了，玉米开心就好～<br>世界上最可爱的玉米 🌽💕
    </div>
    <button class="waiter-close" onclick="closeWaiter()">玉米很满意！🌽</button>
  </div>
</div>

<script>
// ===== DATA =====
const menus = [
  [
    // 霸王茶姬系
    { icon: '🍃', name: '伯牙绝弦', desc: '霸王茶姬当家花旦，茉莉+乌龙，清香到飞起' },
    { icon: '🌺', name: '玉容雪莲', desc: '荔枝玫瑰的绝配，喝一口像掉进花园里' },
    { icon: '🌙', name: '碎银几两', desc: '老白茶奶茶界天花板，顺滑度满分' },
    // 喜茶系
    { icon: '🍇', name: '多肉葡萄', desc: '喜茶招牌，厚乳葡萄爆珠，一杯不够喝' },
    { icon: '🍑', name: '多肉蜜桃', desc: '蜜桃季限定，甜到心里的那种' },
    { icon: '🥥', name: '椰子波波冰', desc: '椰椰椰！夏天必喝，冰爽一整天' },
    // 奈雪系
    { icon: '🍓', name: '霸气草莓', desc: '奈雪当家，新鲜草莓满满当当' },
    { icon: '🍊', name: '鸭屎香柠茶', desc: '名字奇怪但真的好喝，凤凰单丛+柠檬绝了' },

// ===== STATE =====
let currentTab = 0;

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}
function playTone(freq, type = 'sine', dur = 0.15, vol = 0.3) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playAdd() { playTone(600, 'sine', 0.12, 0.25); setTimeout(() => playTone(800, 'sine', 0.12, 0.2), 80); }
function playEgg1() {
  [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.2,0.3), i*80));
}
function playEgg2() {
  [392,494,587,698,784].forEach((f,i) => setTimeout(() => playTone(f,'triangle',0.18,0.25), i*70));
}
function playEgg3() {
  [880,1046,1318].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.3,0.3), i*100));
}
function playSend() {
  [523,659,784].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.2,0.3), i*90));
}

// ===== RENDER =====
function renderMenu() {
  const section = document.getElementById('menuSection');
  const items = menus[currentTab];
  section.innerHTML = `<div class="section-label">共 ${items.length} 个选项</div>`;
  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    if (item.id) div.id = item.id;
    div.innerHTML = `
      <div class="menu-item-icon">${item.icon}</div>
      <div class="menu-item-info">
        <div class="menu-item-name">${item.name}</div>
        <div class="menu-item-desc">${item.desc}</div>
      </div>
      <button class="menu-item-btn" onclick="addToCart(${currentTab},${idx},event)">＋</button>
    `;
    if (item.special === 'sad') {
      div.addEventListener('click', (e) => {
        if (!e.target.classList.contains('menu-item-btn')) handleSadClick();
      });
    }
    section.appendChild(div);
  });
}

function updateCartBar() {
  const total = Object.values(cart).reduce((s, v) => s + v.qty, 0);
  document.getElementById('cartBadge').textContent = total;
  const text = document.getElementById('cartBarText');
  if (total === 0) {
    text.innerHTML = '<span style="color:rgba(255,255,255,0.85);font-size:15px">还没选呢，快点点点～</span>';
  } else {
    const names = Object.values(cart).map(v => v.name).slice(0,2).join('、');
    const more = Object.keys(cart).length > 2 ? '...' : '';
    text.innerHTML = `<span style="color:#fff;font-size:13px">已选：${names}${more}</span>`;
  }
}

function renderCartItems() {
  const container = document.getElementById('sheetItems');
  const keys = Object.keys(cart);
  if (keys.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--text-light);font-size:14px">空空的，快去点些什么吧～</div>';
    return;
  }
  container.innerHTML = '';
  keys.forEach(k => {
    const item = cart[k];
    const div = document.createElement('div');
    div.className = 'sheet-item';
    div.innerHTML = `
      <span class="sheet-item-icon">${item.icon}</span>
      <span class="sheet-item-name">${item.name}</span>
      <div class="sheet-item-qty">
        <button class="qty-btn" onclick="changeQty('${k}',-1)">－</button>
        <span>${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${k}',1)">＋</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// ===== ACTIONS =====
function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  renderMenu();
}

function addToCart(tabIdx, itemIdx, e) {
  e.stopPropagation();
  const item = menus[tabIdx][itemIdx];
  const key = `${tabIdx}-${itemIdx}`;
  if (cart[key]) cart[key].qty++;
  else cart[key] = { name: item.name, icon: item.icon, qty: 1 };
  playAdd();
  updateCartBar();
  // animate button
  const btn = e.currentTarget;
  btn.style.background = '#FF85A1';
  btn.style.color = '#fff';
  setTimeout(() => { btn.style.background = ''; btn.style.color = ''; }, 300);
}

function changeQty(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  renderCartItems();
  updateCartBar();
}

function openCart() {
  renderCartItems();
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeCart() {
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

function clearCart() {
  cart = {};
  renderCartItems();
  updateCartBar();
  showToast('已清空啦 🗑️');
}

// ===== SEND (with long press easter egg) =====
function startSend() {
  const total = Object.values(cart).reduce((s, v) => s + v.qty, 0);
  if (total === 0) { showToast('还没点东西呢，先去挑一挑吧～'); return; }
  if (total >= 3) {
    // long press setup is done via mousedown/touchstart — this is the click handler (short press)
    doSend();
  } else {
    doSend();
  }
}

function doSend() {
  playSend();
  closeCart();
  setTimeout(() => showToast('💌 已发给他啦！玉米的愿望马上实现～🌽'), 300);
}

// Long press for waiter easter egg
const btnSend = document.getElementById('btnSend');
function onSendDown(e) {
  const total = Object.values(cart).reduce((s, v) => s + v.qty, 0);
  if (total < 3) return;
  sendPressing = true;
  btnSend.classList.add('btn-send-press');
  sendPressTimer = setTimeout(() => {
    if (sendPressing) {
      sendPressing = false;
      triggerWaiter();
    }
  }, 2000);
}
function onSendUp(e) {
  if (sendPressTimer) clearTimeout(sendPressTimer);
  if (sendPressing) {
    sendPressing = false;
    // it was a normal click, doSend
    startSend();
  }
  btnSend.classList.remove('btn-send-press');
}
btnSend.addEventListener('mousedown', onSendDown);
btnSend.addEventListener('touchstart', onSendDown, { passive: true });
btnSend.addEventListener('mouseup', onSendUp);
btnSend.addEventListener('touchend', onSendUp);
btnSend.removeAttribute('onclick');

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}
